name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-south1
  SERVICE_NAME: healthlink
  AR_REPO: healthlink
  # Artifact Registry image path (Container Registry / gcr.io is deprecated)
  IMAGE_NAME: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/healthlink/healthlink
  # Streamlit UI (separate Cloud Run service + image)
  STREAMLIT_SERVICE_NAME: healthlink-streamlit
  STREAMLIT_IMAGE_NAME: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/healthlink/healthlink-streamlit

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run linting
        run: |
          pip install ruff black
          cd backend
          ruff check . || true
          black --check . || true

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
        run: |
          cd backend
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term || true

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  build-and-deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe ${{ env.AR_REPO }} \
            --location ${{ env.REGION }} >/dev/null 2>&1 || \
          gcloud artifacts repositories create ${{ env.AR_REPO }} \
            --repository-format docker \
            --location ${{ env.REGION }} \
            --description "HealthLink container images"

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest

      - name: Push Docker image to Artifact Registry
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --service-account ${{ vars.SERVICE_ACCOUNT }} \
            --allow-unauthenticated \
            --port 8080 \
            --memory 4Gi \
            --cpu 2 \
            --timeout 300 \
            --max-instances 10 \
            --min-instances 0 \
            --set-env-vars "LOG_LEVEL=INFO" \
            --set-secrets "ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,PINECONE_API_KEY=PINECONE_API_KEY:latest"

      - name: Get service URL
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "Service deployed to: $SERVICE_URL"
          echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_ENV

      - name: Run health check
        run: |
          sleep 15
          curl -f ${{ env.SERVICE_URL }}/api/v1/health || exit 1
          echo "Health check passed!"

  deploy-streamlit:
    name: Build and Deploy Streamlit UI
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Get backend URL
        run: |
          BACKEND_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "Backend URL: $BACKEND_URL"
          echo "BACKEND_URL=$BACKEND_URL" >> $GITHUB_ENV

      - name: Build Streamlit image
        run: |
          docker build -t ${{ env.STREAMLIT_IMAGE_NAME }}:${{ github.sha }} ./ui
          docker tag ${{ env.STREAMLIT_IMAGE_NAME }}:${{ github.sha }} ${{ env.STREAMLIT_IMAGE_NAME }}:latest

      - name: Push Streamlit image
        run: |
          docker push ${{ env.STREAMLIT_IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.STREAMLIT_IMAGE_NAME }}:latest

      - name: Deploy Streamlit to Cloud Run
        run: |
          gcloud run deploy ${{ env.STREAMLIT_SERVICE_NAME }} \
            --image ${{ env.STREAMLIT_IMAGE_NAME }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --service-account ${{ vars.SERVICE_ACCOUNT }} \
            --allow-unauthenticated \
            --port 8080 \
            --memory 1Gi \
            --cpu 1 \
            --timeout 300 \
            --max-instances 5 \
            --min-instances 0 \
            --set-env-vars "API_BASE_URL=${BACKEND_URL}/api/v1"

      - name: Get Streamlit URL
        run: |
          UI_URL=$(gcloud run services describe ${{ env.STREAMLIT_SERVICE_NAME }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "Streamlit UI deployed to: $UI_URL"
          echo "UI_URL=$UI_URL" >> $GITHUB_ENV

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [build-and-deploy, deploy-streamlit]
    if: always()

    steps:
      - name: Deployment Success
        if: needs.build-and-deploy.result == 'success' && needs.deploy-streamlit.result == 'success'
        run: |
          echo "Deployment successful!"
          echo "HealthLink backend and Streamlit UI are now live on Google Cloud Run"

      - name: Deployment Failed
        if: needs.build-and-deploy.result == 'failure' || needs.deploy-streamlit.result == 'failure'
        run: |
          echo "Deployment failed!"
          echo "Please check the logs above for errors"
          exit 1